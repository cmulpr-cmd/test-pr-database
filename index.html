<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PR CMUL Dashboard — ระบบสรุปผลการดำเนินการ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #f0f4ff;
  --surface: #ffffff;
  --border: rgba(0,0,0,0.07);
  --border-hover: rgba(0,0,0,0.14);
  --text: #1a1d2e;
  --text-dim: #5a6178;
  --text-muted: #8c93a8;
  --cyan: #0891b2;
  --blue: #2563eb;
  --violet: #7c3aed;
  --pink: #db2777;
  --emerald: #059669;
  --amber: #d97706;
  --sky: #0ea5e9;
}
body {
  font-family: 'Sarabun', 'Noto Sans Thai', sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
}

/* Background Animations */
.bg-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-scene::before { content: ''; position: absolute; top: -20%; left: -15%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(8,145,178,0.08) 0%, transparent 70%); animation: drift1 20s ease-in-out infinite; }
.bg-scene::after { content: ''; position: absolute; bottom: -15%; right: -10%; width: 55%; height: 55%; background: radial-gradient(ellipse, rgba(124,58,237,0.06) 0%, transparent 70%); animation: drift2 25s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4%,6%)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5%,-4%)} }

@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideUp{from{opacity:0;transform:translateY(40px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.15);border-radius:3px;}

.page { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

/* Topbar */
.topbar { padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.brand-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, var(--violet), var(--blue)); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,0.25); font-weight:800; }
.brand-text { font-size: 14px; font-weight: 600; color: var(--text-dim); }
.brand-text span { color: var(--text); font-weight: 700; }

.user-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.user-info { text-align: right; margin-right: 8px; }
.user-name { color: var(--text); font-size: 14px; font-weight: 700; }
.user-role { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top:2px; }
.role-head { background: rgba(219,39,119,0.1); color: var(--pink); border: 1px solid rgba(219,39,119,0.2); }
.role-admin { background: rgba(37,99,235,0.1); color: var(--blue); border: 1px solid rgba(37,99,235,0.2); }

.btn-action { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans Thai', sans-serif; border:none; }
.btn-manage { background: rgba(124,58,237,0.1); color: var(--violet); border: 1px solid rgba(124,58,237,0.2); }
.btn-manage:hover { background: rgba(124,58,237,0.15); }
.btn-logout { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.btn-logout:hover { background: rgba(239,68,68,0.15); }

/* Hero */
.hero { flex: 0 0 auto; padding: 50px 40px 30px; text-align: center; }
.hero-chip { display: inline-flex; align-items: center; gap: 8px; padding: 7px 20px; border-radius: 100px; background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(37,99,235,0.08)); border: 1px solid rgba(124,58,237,0.15); color: var(--violet); font-size: 13px; font-weight: 700; margin-bottom: 24px; }
.hero-chip::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--emerald); animation: blink 2.5s ease-in-out infinite; }
.hero h1 { font-family: 'Noto Sans Thai', sans-serif; font-size: 38px; font-weight: 900; line-height: 1.25; letter-spacing: -0.5px; margin-bottom: 18px; }
.hero h1 .line1 { color: var(--text); }
.hero h1 .line2 { background: linear-gradient(90deg, var(--violet), var(--blue), var(--cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero-desc { font-size: 16px; color: var(--text-dim); max-width: 600px; margin: 0 auto; line-height: 1.6; }

/* Year Selector */
.year-selector { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; margin-top: 24px; }
.btn-year { padding: 10px 24px; border-radius: 100px; border: 1px solid var(--border); background: rgba(255,255,255,0.6); color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Noto Sans Thai', sans-serif; }
.btn-year.active { background: linear-gradient(135deg, var(--violet), var(--blue)); color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(124,58,237,0.25); }
.btn-year:hover:not(.active) { background: var(--surface); color: var(--text); border-color: var(--border-hover); }

/* Cards Grid */
.cards-section { flex: 1; padding: 0 40px 80px; max-width: 1200px; margin: 0 auto; width: 100%; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }

.report-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 22px; padding: 28px; transition: all 0.4s cubic-bezier(0.25,1,0.5,1); box-shadow: 0 2px 12px rgba(0,0,0,0.03); display: flex; flex-direction: column; overflow: hidden; }
.report-card.has-data { cursor: pointer; }
.report-card.has-data:hover { transform: translateY(-6px); border-color: var(--border-hover); box-shadow: 0 16px 40px rgba(124,58,237,0.08), 0 4px 12px rgba(0,0,0,0.04); }
.report-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; transition: opacity 0.3s; opacity: 0; }
.report-card.has-data::before { opacity: 1; background: linear-gradient(90deg, var(--violet), var(--blue), var(--cyan)); }

.card-icon { width: 50px; height: 50px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 24px; }
.card-icon.done { background: rgba(124,58,237,0.1); color: var(--violet); }
.card-icon.empty { background: rgba(0,0,0,0.04); color: var(--text-muted); }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.card-badge { font-size: 11px; font-weight: 800; padding: 4px 10px; border-radius: 8px; }
.badge-done { background: rgba(5,150,105,0.1); color: var(--emerald); }
.badge-pending { background: rgba(217,119,6,0.1); color: var(--amber); }

.card-title { font-family: 'Noto Sans Thai', sans-serif; font-size: 22px; font-weight: 800; line-height: 1.3; color: var(--text); margin-bottom: 8px; }
.card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.6; flex: 1; }

.card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }
.card-cta { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: var(--violet); transition: all 0.3s; }
.card-cta.disabled { color: var(--text-muted); }
.report-card.has-data:hover .cta-arrow { transform: translateX(4px); }
.cta-arrow { transition: transform 0.3s; display: inline-block; }

.btn-edit { padding: 6px 14px; border-radius: 8px; background: rgba(0,0,0,0.04); border: 1px solid rgba(0,0,0,0.08); color: var(--text-dim); font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans Thai', sans-serif; }
.btn-edit:hover { background: rgba(37,99,235,0.1); color: var(--blue); border-color: rgba(37,99,235,0.2); }

/* Footer */
.page-footer { padding: 30px 40px; text-align: center; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); background: rgba(255,255,255,0.5); }

/* Utilities */
.fade-up-anim { animation: fadeUp 0.6s cubic-bezier(0.25,1,0.5,1) both; }

@media (max-width: 768px) {
  .hero h1 { font-size: 30px; }
  .hero, .cards-section, .topbar { padding-left: 20px; padding-right: 20px; }
  .user-info { display: none; }
}

/* Modal Overrides for Admin Panel (Keeping them dark for contrast) */
.admin-modal-overlay { position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;animation:fadeIn 0.3s ease; }
.admin-modal-content { background:#ffffff;border-radius:24px;width:90%;maxWidth:640px;maxHeight:90vh;overflow:auto;border:1px solid var(--border);box-shadow:0 25px 60px rgba(0,0,0,0.15);animation:slideUp 0.4s ease; color: var(--text); }
.admin-modal-header { padding:24px 28px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between; background: rgba(0,0,0,0.02); }
.admin-modal-body { padding:24px 28px; }
</style>
<script>
// --- AUTH BLOCK ---
(function(){
  var allowed=false;
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        var TIMEOUT_MS=30*60*1000;
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){
          var lastAct=localStorage.getItem('cc_pr_lastActivity');
          if(lastAct&&(Date.now()-parseInt(lastAct,10))>TIMEOUT_MS){
            localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
          }else{localStorage.setItem('cc_pr_lastActivity',Date.now().toString());allowed=true;}
        }else{localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');}
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f0f4ff 0%,#e0e7ff 100%);font-family:Noto Sans Thai,sans-serif">'+
        '<div style="background:#fff;border-radius:24px;padding:48px 40px;text-align:center;max-width:440px;width:90%;border:1px solid rgba(0,0,0,0.05);box-shadow:0 25px 60px rgba(0,0,0,0.1)">'+
        '<div style="font-size:64px;margin-bottom:16px">&#128274;</div>'+
        '<h1 style="color:#1a1d2e;font-size:26px;font-weight:700;margin-bottom:8px">Access Denied</h1>'+
        '<h1 style="color:#1a1d2e;font-size:22px;font-weight:700;margin-bottom:8px">ปฏิเสธการอนุญาตเข้าถึงข้อมูล</h1>'+
        '<h3 style="color:#5a6178;font-size:15px;line-height:1.7;margin-bottom:20px">กรุณาเข้าสู่ระบบผ่านหน้า Login ให้สำเร็จ</h3>'+
        '<a href="index.html" style="display:inline-block;padding:14px 36px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;text-decoration:none;font-weight:600;font-size:15px">ไปยังหน้าเข้าสู่ระบบ →</a>'+
        '</div></div>';
    });
  }
})();
</script>
</head>
<body>
<div class="bg-scene"></div>
<div id="root"></div>

<script type="text/babel">
if(window.__AUTH_BLOCKED__) throw new Error('auth');
const{useState,useEffect,useCallback,useRef}=React;

// ★★★ วาง URL ของ Google Apps Script Web App ที่นี่ ★★★
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbwbgS1p5LXE3U7zlq1NdZithqP6pN9X7GcJIkOz9jFYnKP7xZBAbrq2xDeXtnw6w2pE/exec";

const MONTHS_TH=["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
const MONTHS_SHORT=["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const YEARS=[2568,2569,2570];
const MONTH_ICONS=["🗓️","💕","🌸","☀️","🌧️","🌈","🌻","⛅","🍂","🎃","🍁","🎄"];
const MONTH_EN=["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];

function getUser(){try{return JSON.parse(localStorage.getItem('cc_pr_user'));}catch(e){return null;}}

// ★★★ Google Sheets API ★★★
const api={
  async getReports(){
    try{const r=await fetch(SCRIPT_URL+"?action=getReports");const d=await r.json();return d.reports||{};}catch(e){console.error("API getReports:",e);return{};}
  },
  async saveReport(data){
    try{const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"saveReport",data}),headers:{"Content-Type":"text/plain"}});return await r.json();}catch(e){console.error("API saveReport:",e);return{error:e.message};}
  },
  async deleteReport(year,month){
    try{const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"deleteReport",year,month}),headers:{"Content-Type":"text/plain"}});return await r.json();}catch(e){console.error("API deleteReport:",e);return{error:e.message};}
  },
  async getPermissions(){
    try{const r=await fetch(SCRIPT_URL+"?action=getPermissions");const d=await r.json();return d.permissions;}catch(e){console.error("API getPermissions:",e);return null;}
  },
  async savePermissions(data){
    try{const r=await fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"savePermissions",data}),headers:{"Content-Type":"text/plain"}});return await r.json();}catch(e){console.error("API savePermissions:",e);return{error:e.message};}
  }
};

function emptyData(){
  const data={};
  YEARS.forEach(y=>{data[y]={};MONTHS_TH.forEach(m=>{data[y][m]={embedUrl:"",fileName:null,fileSize:null,uploadDate:null,cloudinaryUrl:null,cloudinaryId:null,status:"empty"};});});
  return data;
}
function mergeData(saved){
  const data=emptyData();
  if(!saved)return data;
  Object.keys(saved).forEach(y=>{if(data[y]){Object.keys(saved[y]).forEach(m=>{if(data[y][m]){data[y][m]={...data[y][m],...saved[y][m]};}});}});
  return data;
}

// ★★★ Component: MonthCard ★★★
function MonthCard({month, index, data, onOpenAdmin, canAdmin}){
  const hasLink = data.embedUrl && data.embedUrl.trim() !== "";
  const hasFile = data.fileName;
  const hasData = hasLink || hasFile;
  const targetUrl = hasLink ? data.embedUrl : (hasFile ? data.cloudinaryUrl : null);
  
  const handleCardClick = () => {
    if(hasData && targetUrl) window.open(targetUrl, '_blank', 'noopener,noreferrer');
  };

  return(
    <div className={`report-card fade-up-anim ${hasData ? 'has-data' : ''}`} style={{animationDelay: `${index * 0.05}s`}} onClick={handleCardClick}>
      <div className="card-header">
        <div className={`card-icon ${hasData ? 'done' : 'empty'}`}>{MONTH_ICONS[index]}</div>
        <div className={`card-badge ${hasData ? 'badge-done' : 'badge-pending'}`}>
          {hasData ? 'รายงานแล้ว' : 'ยังไม่รายงาน'}
        </div>
      </div>
      
      <div className="card-title">เดือน{month}</div>
      <div className="card-desc">
        {hasData 
          ? (hasFile ? `ไฟล์: ${data.fileName}` : "เชื่อมโยงลิงก์รายงานผลแล้ว")
          : "ยังไม่มีการนำเข้าข้อมูลรายงานผลประจำเดือนนี้"}
      </div>

      <div className="card-footer">
        <div className={`card-cta ${!hasData ? 'disabled' : ''}`}>
          {hasData ? <><span style={{color: "var(--violet)"}}>ดูรายงานฉบับเต็ม</span> <span className="cta-arrow" style={{color: "var(--violet)"}}>→</span></> : "ไม่มีข้อมูล"}
        </div>
        
        {canAdmin && (
          <button className="btn-edit" onClick={(e) => { e.stopPropagation(); onOpenAdmin(index); }}>
            ⚙️ จัดการ
          </button>
        )}
      </div>
    </div>
  );
}

// ★★★ Admin Panel (Light Mode Theme Override) ★★★
function AdminPanel({visible, onClose, reportData, setReportData, selectedYear, onRefresh, initialMonthIndex}){
  const[editMonth,setEditMonth]=useState(0);
  const[urlInput,setUrlInput]=useState("");
  const[statusInput,setStatusInput]=useState("uploaded");
  const[saving,setSaving]=useState(false);
  const[saveMsg,setSaveMsg]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[uploading,setUploading]=useState(false);
  const[uploadMsg,setUploadMsg]=useState(null);
  const fileRef=useRef(null);

  const CLOUD_NAME="dpyhc69jg";
  const UPLOAD_PRESET="pr_cmul_upload";

  useEffect(()=>{
    if(visible){
      setEditMonth(initialMonthIndex !== null ? initialMonthIndex : 0);
    }
  },[visible, initialMonthIndex]);

  useEffect(()=>{
    if(visible){
      const d=reportData[selectedYear][MONTHS_TH[editMonth]];
      setUrlInput(d.embedUrl||"");
      setStatusInput(d.status==="empty"?"uploaded":d.status);
    }
  },[visible,editMonth,selectedYear]);

  const handleUpload=useCallback(async(files)=>{
    if(!files||files.length===0)return;
    const file=files[0];
    if(file.size>10*1024*1024){setUploadMsg({ok:false,text:"ไฟล์ใหญ่เกิน 10MB"});setTimeout(()=>setUploadMsg(null),4000);return;}
    setUploading(true);setUploadMsg(null);
    const monthName=MONTHS_TH[editMonth];
    try{
      const fd=new FormData();fd.append("file",file);fd.append("upload_preset",UPLOAD_PRESET);fd.append("folder","pr_cmul/"+selectedYear+"/"+MONTH_EN[editMonth]);
      const ext=file.name.split(".").pop().toLowerCase();
      let rt="raw";if(["jpg","jpeg","png","gif","webp","svg","bmp"].includes(ext))rt="image";else if(["mp4","mov","avi","webm"].includes(ext))rt="video";
      const cRes=await fetch("https://api.cloudinary.com/v1_1/"+CLOUD_NAME+"/"+rt+"/upload",{method:"POST",body:fd});
      const cText=await cRes.text();
      let cData;try{cData=JSON.parse(cText);}catch(e){throw new Error("Cloudinary error");}
      if(!cRes.ok)throw new Error(cData.error?.message||"Cloud error");

      const reportRow={year:selectedYear,month:monthName,embedUrl:urlInput.trim()||"",fileName:file.name,fileSize:(file.size/(1024*1024)).toFixed(1)+" MB",uploadDate:new Date().toLocaleDateString("th-TH"),cloudinaryUrl:cData.secure_url,cloudinaryId:cData.public_id,status:"uploaded"};
      const sRes=await api.saveReport(reportRow);
      if(sRes.error)throw new Error("Sheet error: "+sRes.error);

      setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][monthName]={...reportRow};return u;});
      setUploadMsg({ok:true,text:"อัปโหลดสำเร็จ!"});setTimeout(()=>setUploadMsg(null),4000);
    }catch(err){setUploadMsg({ok:false,text:"ผิดพลาด: "+err.message});setTimeout(()=>setUploadMsg(null),8000);}finally{setUploading(false);}
  },[editMonth,selectedYear,setReportData,urlInput]);

  const handleSave=async()=>{
    setSaving(true);setSaveMsg(null);
    const monthName=MONTHS_TH[editMonth];
    const existing=reportData[selectedYear][monthName];
    const reportRow={year:selectedYear,month:monthName,embedUrl:urlInput.trim(),fileName:existing.fileName||"",fileSize:existing.fileSize||"",uploadDate:existing.uploadDate||"",cloudinaryUrl:existing.cloudinaryUrl||"",cloudinaryId:existing.cloudinaryId||"",status:urlInput.trim()||existing.fileName?statusInput:"empty"};
    try{
      const res=await api.saveReport(reportRow);
      if(res.error)throw new Error(res.error);
      setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][monthName]={...reportRow};return u;});
      setSaveMsg({ok:true,text:"บันทึกสำเร็จ!"});
    }catch(err){setSaveMsg({ok:false,text:"ผิดพลาด: "+err.message});}finally{setSaving(false);setTimeout(()=>setSaveMsg(null),4000);}
  };

  const handleDelete=async(m)=>{
    if(!confirm("ลบข้อมูลเดือน "+m+" ?"))return;
    await api.deleteReport(selectedYear,m);
    setReportData(prev=>{const u=JSON.parse(JSON.stringify(prev));u[selectedYear][m]={embedUrl:"",fileName:null,fileSize:null,uploadDate:null,cloudinaryUrl:null,cloudinaryId:null,status:"empty"};return u;});
  };

  if(!visible)return null;

  return(
    <div className="admin-modal-overlay" onClick={onClose}>
      <div className="admin-modal-content" onClick={e=>e.stopPropagation()}>
        <div className="admin-modal-header">
          <div><h2 style={{fontSize:20,fontWeight:800}}>⚙️ จัดการข้อมูลรายงาน</h2><p style={{color:"var(--text-dim)",fontSize:13,marginTop:4}}>อัปโหลดไฟล์ หรือใส่ลิงก์รายงานผล</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1px solid var(--border)",background:"#fff",color:"var(--text-dim)",fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>

        <div className="admin-modal-body">
          <div style={{background:"rgba(124,58,237,0.05)",borderRadius:12,padding:"12px 16px",marginBottom:20,border:"1px solid rgba(124,58,237,0.15)",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>📅</span><span style={{color:"var(--violet)",fontWeight:700,fontSize:14}}>ปีงบประมาณ {selectedYear}</span>
          </div>

          <div style={{marginBottom:24}}>
            <label style={{color:"var(--text-dim)",fontSize:13,fontWeight:700,display:"block",marginBottom:10}}>เลือกเดือนที่ต้องการแก้ไข</label>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
              {MONTHS_SHORT.map((m,i)=>{const d=reportData[selectedYear][MONTHS_TH[i]];const has=(d.embedUrl&&d.embedUrl.trim()!=="")||d.fileName;return(
                <button key={i} onClick={()=>setEditMonth(i)} style={{padding:"10px 4px",borderRadius:10,position:"relative",border:editMonth===i?"1px solid var(--violet)":"1px solid var(--border)",background:editMonth===i?"rgba(124,58,237,0.1)":"#f9fafb",color:editMonth===i?"var(--violet)":"var(--text-dim)",fontSize:13,fontWeight:editMonth===i?700:500,cursor:"pointer",fontFamily:"'Noto Sans Thai',sans-serif"}}>
                  {MONTH_ICONS[i]} {m}{has&&<span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",background:"var(--emerald)"}}/>}
                </button>);})}
            </div>
          </div>

          <div style={{background:"#f8fafc",borderRadius:16,padding:"20px",marginBottom:20,border:"1px solid var(--border)"}}>
            <h3 style={{color:"var(--text)",fontSize:14,fontWeight:700,marginBottom:10}}>🔗 วางลิงก์รายงาน (Google Docs, Canva, เว็บไซต์)</h3>
            <input value={urlInput} onChange={e=>setUrlInput(e.target.value)} placeholder="https://..."
              style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid var(--border)",background:"#fff",color:"var(--text)",fontSize:14,outline:"none",fontFamily:"'Sarabun',sans-serif"}}/>
          </div>

          <div style={{background:"#f8fafc",borderRadius:16,padding:"20px",marginBottom:20,border:"1px solid var(--border)"}}>
            <h3 style={{color:"var(--text)",fontSize:14,fontWeight:700,marginBottom:10}}>📎 หรือ อัปโหลดไฟล์แทนลิงก์</h3>
            {uploading?(
              <div style={{border:"2px dashed rgba(124,58,237,0.3)",borderRadius:12,padding:"24px 16px",textAlign:"center",background:"rgba(124,58,237,0.05)"}}>
                <div style={{fontSize:24,marginBottom:8,animation:"spin 1s linear infinite"}}>⟳</div>
                <p style={{color:"var(--violet)",fontSize:14,fontWeight:600}}>กำลังอัปโหลด...</p>
              </div>
            ):(
              <div onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)} onDrop={e=>{e.preventDefault();setDragOver(false);handleUpload(e.dataTransfer.files);}} onClick={()=>fileRef.current?.click()}
                style={{border:`2px dashed ${dragOver?"var(--violet)":"var(--border)"}`,borderRadius:12,padding:"24px 16px",textAlign:"center",cursor:"pointer",background:dragOver?"rgba(124,58,237,0.05)":"#fff"}}>
                <input ref={fileRef} type="file" accept=".pdf,.doc,.docx,.xlsx,.xls,.pptx,.png,.jpg,.jpeg" style={{display:"none"}} onChange={e=>handleUpload(e.target.files)}/>
                <div style={{fontSize:28,marginBottom:8,opacity:0.8}}>📥</div>
                <p style={{color:"var(--text)",fontSize:13,fontWeight:600,marginBottom:4}}>คลิกหรือลากไฟล์มาวางที่นี่ (ไม่เกิน 10MB)</p>
              </div>
            )}
            {uploadMsg&&(<div style={{marginTop:12,color:uploadMsg.ok?"var(--emerald)":"#ef4444",fontSize:13,fontWeight:600}}>{uploadMsg.text}</div>)}
            {reportData[selectedYear][MONTHS_TH[editMonth]].fileName&&(
              <div style={{marginTop:12,padding:"10px 14px",borderRadius:10,background:"rgba(5,150,105,0.05)",border:"1px solid rgba(5,150,105,0.15)",display:"flex",gap:8,fontSize:13}}>
                📄 <span style={{fontWeight:600,flex:1}}>{reportData[selectedYear][MONTHS_TH[editMonth]].fileName}</span>
                <button onClick={()=>handleDelete(MONTHS_TH[editMonth])} style={{color:"#ef4444",background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"'Noto Sans Thai'"}}>ลบ</button>
              </div>
            )}
          </div>

          <button onClick={handleSave} disabled={saving} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(135deg,var(--violet),var(--blue))",color:"#fff",fontSize:15,fontWeight:700,cursor:saving?"wait":"pointer",fontFamily:"'Noto Sans Thai',sans-serif",boxShadow:"0 4px 16px rgba(124,58,237,0.3)",marginBottom:10}}>
            {saving?"⏳ กำลังบันทึก...":"💾 บันทึกข้อมูล"}
          </button>
          {saveMsg&&(<div style={{textAlign:"center",color:saveMsg.ok?"var(--emerald)":"#ef4444",fontSize:14,fontWeight:600}}>{saveMsg.text}</div>)}
        </div>
      </div>
    </div>
  );
}

// ★★★ Main Dashboard ★★★
function Dashboard(){
  const[reportData,setReportData]=useState(emptyData);
  const[selectedYear,setSelectedYear]=useState(2568);
  const[showAdmin,setShowAdmin]=useState(false);
  const[adminMonthIndex,setAdminMonthIndex]=useState(null);
  const[dataLoading,setDataLoading]=useState(true);
  const user=getUser();

  const loadData=useCallback(async()=>{
    setDataLoading(true);
    try{
      const saved=await api.getReports();
      setReportData(mergeData(saved));
    }catch(e){console.error("Load error:",e);}
    finally{setDataLoading(false);}
  },[]);

  useEffect(()=>{loadData();},[]);

  // Activity timeout check
  useEffect(()=>{
    const TIMEOUT_MS=30*60*1000;
    function updateActivity(){localStorage.setItem('cc_pr_lastActivity',Date.now().toString());}
    const events=['mousemove','mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev=>window.addEventListener(ev,updateActivity,{passive:true}));
    updateActivity();
    const checker=setInterval(()=>{
      const last=parseInt(localStorage.getItem('cc_pr_lastActivity')||'0',10);
      if(Date.now()-last>TIMEOUT_MS){
        clearInterval(checker);localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
        window.location.href="index.html";
      }
    },10000);
    return()=>{events.forEach(ev=>window.removeEventListener(ev,updateActivity));clearInterval(checker);};
  },[]);

  const canAdmin=user&&user.role==="admin";
  const handleLogout=()=>{localStorage.removeItem("cc_pr_user");localStorage.removeItem("cc_pr_lastActivity");window.location.href="index.html";};

  const openAdminModal = (index = null) => {
    setAdminMonthIndex(index);
    setShowAdmin(true);
  };

  return(
    <div className="page">
      <header className="topbar">
        <div className="topbar-brand fade-up-anim">
          <div className="brand-icon">PR</div>
          <div className="brand-text"><span>หน่วยสื่อสารองค์กร</span><br/>สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</div>
        </div>
        
        <div className="user-actions fade-up-anim" style={{animationDelay:"0.1s"}}>
          {user && (
            <div className="user-info">
              <div className="user-name">{user.displayName}</div>
              <div className={`user-role ${user.role === 'head' ? 'role-head' : 'role-admin'}`}>{user.roleLabel}</div>
            </div>
          )}
          {canAdmin && <button className="btn-action btn-manage" onClick={()=>openAdminModal(null)}>⚙️ แผงควบคุม</button>}
          <button className="btn-action btn-logout" onClick={handleLogout}>🚪 ออกจากระบบ</button>
        </div>
      </header>

      <section className="hero">
        <div className="hero-chip fade-up-anim" style={{animationDelay:"0.2s"}}>ศูนย์รวมรายงานผล</div>
        <h1 className="fade-up-anim" style={{animationDelay:"0.3s"}}>
          <span className="line1">ระบบสรุปผลการดำเนินการ</span><br/>
          <span className="line2">PR CMUL Dashboard</span>
        </h1>
        <p className="hero-desc fade-up-anim" style={{animationDelay:"0.4s"}}>
          เลือกปีงบประมาณและเดือนเพื่อเรียกดูรายงานผลการดำเนินการ<br/>
          (คลิกที่การ์ดเพื่อดูรายงานฉบับเต็มในแท็บใหม่)
        </p>

        <div className="year-selector fade-up-anim" style={{animationDelay:"0.5s"}}>
          {YEARS.map(y=>(
            <button key={y} className={`btn-year ${selectedYear===y?'active':''}`} onClick={()=>setSelectedYear(y)}>
              ปี พ.ศ. {y}
            </button>
          ))}
        </div>
      </section>

      <section className="cards-section">
        {dataLoading ? (
          <div style={{textAlign:"center",padding:"40px 0"}}>
            <div style={{fontSize:40,animation:"spin 1s linear infinite",marginBottom:16, color:"var(--violet)"}}>⟳</div>
            <h2 style={{color:"var(--text)",fontSize:20,fontWeight:700}}>กำลังโหลดข้อมูล...</h2>
          </div>
        ) : (
          <div className="cards-grid">
            {MONTHS_TH.map((month,i)=>(
              <MonthCard 
                key={`${selectedYear}-${month}`} 
                month={month} 
                index={i} 
                data={reportData[selectedYear][month]} 
                onOpenAdmin={openAdminModal} 
                canAdmin={canAdmin}
              />
            ))}
          </div>
        )}
      </section>

      <footer className="page-footer fade-up-anim" style={{animationDelay:"0.8s"}}>
        หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่ &middot; PR CMUL Dashboard &middot; Developed by Thianrawich and Team
      </footer>

      {canAdmin && (
        <AdminPanel 
          visible={showAdmin} 
          onClose={()=>setShowAdmin(false)} 
          reportData={reportData} 
          setReportData={setReportData} 
          selectedYear={selectedYear} 
          onRefresh={loadData}
          initialMonthIndex={adminMonthIndex}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
