<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #f3f5f9;
  --surface: #ffffff;
  --text: #1a1d2e;
  --text-dim: #5a6178;
  --text-muted: #8c93a8;
  --border: #e2e8f0;
}
body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Background Animation */
.bg-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-scene::before { content: ''; position: absolute; top: -20%; left: -15%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(8,145,178,0.05) 0%, transparent 70%); animation: drift1 20s ease-in-out infinite; }
.bg-scene::after { content: ''; position: absolute; bottom: -15%; right: -10%; width: 55%; height: 55%; background: radial-gradient(ellipse, rgba(124,58,237,0.05) 0%, transparent 70%); animation: drift2 25s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4%,6%)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5%,-4%)} }
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.page { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

/* Topbar */
.topbar { padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.brand-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #7c3aed, #2563eb); display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; box-shadow: 0 4px 16px rgba(124,58,237,0.25); font-weight:800; }
.brand-text { font-size: 14px; font-weight: 600; color: var(--text-dim); }
.brand-text span { color: var(--text); font-weight: 700; }
.user-actions { display: flex; align-items: center; gap: 12px; }
.user-info { text-align: right; margin-right: 8px; }
.user-name { color: var(--text); font-size: 14px; font-weight: 700; }
.btn-logout { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border:none; background: rgba(239,68,68,0.1); color: #ef4444; font-family: 'Noto Sans Thai', sans-serif; transition: 0.2s; }
.btn-logout:hover { background: rgba(239,68,68,0.15); }

/* Hero & Year Selector */
.hero { padding: 40px 40px 20px; text-align: center; }
.hero h1 { font-family: 'Noto Sans Thai', sans-serif; font-size: 32px; font-weight: 900; color: var(--text); margin-bottom: 10px; }
.year-selector { display: flex; justify-content: center; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
.btn-year { padding: 10px 24px; border-radius: 100px; border: 1px solid var(--border); background: #fff; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Noto Sans Thai', sans-serif; }
.btn-year.active { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(124,58,237,0.25); }

/* Cards Grid */
.cards-section { flex: 1; padding: 20px 40px 80px; max-width: 1200px; margin: 0 auto; width: 100%; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; }

/* Custom Report Card (Match exactly with User's Image) */
.custom-card {
  background: var(--surface); border-radius: 20px; padding: 35px 30px;
  position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03);
  transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column;
}
.custom-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
.card-top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; }

/* Theme: Internal (Green/Blue) */
.theme-internal .card-top-line { background: linear-gradient(90deg, #10b981, #0ea5e9); }
.theme-internal .c-icon-box { background: #ecfdf5; color: #0f766e; }
.theme-internal .c-badge { background: #d1fae5; color: #047857; }
.theme-internal .c-stat-val { color: #0284c7; }
.theme-internal .c-btn { background: linear-gradient(90deg, #10b981, #0ea5e9); }

/* Theme: External (Pink/Purple) */
.theme-external .card-top-line { background: linear-gradient(90deg, #ec4899, #8b5cf6); }
.theme-external .c-icon-box { background: #fdf2f8; color: #be185d; }
.theme-external .c-badge { background: #fce7f3; color: #be185d; }
.theme-external .c-stat-val { color: #7c3aed; }
.theme-external .c-btn { background: linear-gradient(90deg, #d946ef, #8b5cf6); }

/* Theme: Empty (Gray) */
.theme-empty .card-top-line { background: #e2e8f0; }
.theme-empty .c-icon-box { background: #f1f5f9; color: #94a3b8; }
.theme-empty .c-badge { background: #f1f5f9; color: #64748b; }

.c-header { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 20px; }
.c-icon-box { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
.c-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; font-family: 'Noto Sans Thai'; }
.c-title { font-family: 'Noto Sans Thai', sans-serif; font-size: 20px; font-weight: 800; line-height: 1.4; color: var(--text); margin-bottom: 12px; }
.c-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; flex: 1; }

.c-stats-row { display: flex; gap: 24px; margin-top: 24px; padding-top: 24px; border-top: 1px dashed #e2e8f0; }
.c-stat-col { flex: 1; }
.c-stat-val { font-size: 24px; font-weight: 800; font-family: 'Noto Sans Thai'; margin-bottom: 4px; letter-spacing: -0.5px; }
.c-stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }

.c-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 12px 24px; border-radius: 12px; color: #fff; text-decoration: none;
  font-family: 'Noto Sans Thai'; font-size: 14px; font-weight: 700;
  margin-top: 24px; width: fit-content; transition: opacity 0.3s; border: none; cursor:pointer;
}
.c-btn:hover { opacity: 0.9; }
.c-btn-empty { background: #e2e8f0; color: #64748b; cursor: not-allowed; }

@media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 24px; } }
</style>

// --- AUTH BLOCK (รักษาความปลอดภัยเหมือนเดิม) ---
(function(){
  var allowed=false;
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        var TIMEOUT_MS=30*60*1000;
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){
          var lastAct=localStorage.getItem('cc_pr_lastActivity');
          if(lastAct&&(Date.now()-parseInt(lastAct,10))>TIMEOUT_MS){
            localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
          }else{localStorage.setItem('cc_pr_lastActivity',Date.now().toString());allowed=true;}
        }else{localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');}
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f3f5f9;font-family:Noto Sans Thai,sans-serif">'+
        '<div style="background:#fff;border-radius:24px;padding:48px 40px;text-align:center;max-width:440px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,0.1)">'+
        '<h1 style="color:#1a1d2e;font-size:22px;font-weight:700;margin-bottom:8px">Access Denied</h1>'+
        '<h3 style="color:#5a6178;font-size:15px;margin-bottom:20px">กรุณาเข้าสู่ระบบก่อนใช้งาน</h3>'+
        '<a href="index.html" style="display:inline-block;padding:12px 30px;border-radius:10px;background:#7c3aed;color:#fff;text-decoration:none;font-weight:600;">เข้าสู่ระบบ</a>'+
        '</div></div>';
    });
  }
})();
</script>

const YEARS = [2568, 2569, 2570, 2571, 2572];
// =========================================================================

function getUser(){try{return JSON.parse(localStorage.getItem('cc_pr_user'));}catch(e){return null;}}

function Dashboard(){
  const[selectedYear,setSelectedYear]=useState(2568);
  const user=getUser();

  useEffect(()=>{
    const TIMEOUT_MS=30*60*1000;
    function updateActivity(){localStorage.setItem('cc_pr_lastActivity',Date.now().toString());}
    const events=['mousemove','mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev=>window.addEventListener(ev,updateActivity,{passive:true}));
    updateActivity();
    const checker=setInterval(()=>{
      const last=parseInt(localStorage.getItem('cc_pr_lastActivity')||'0',10);
      if(Date.now()-last>TIMEOUT_MS){
        clearInterval(checker);localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
        window.location.href="index.html";
      }
    },10000);
    return()=>{events.forEach(ev=>window.removeEventListener(ev,updateActivity));clearInterval(checker);};
  },[]);

  const handleLogout=()=>{localStorage.removeItem("cc_pr_user");localStorage.removeItem("cc_pr_lastActivity");window.location.href="index.html";};

  // ดึงข้อมูลของปีที่เลือกมาแสดง
  const currentYearData = STATIC_REPORT_DATA[selectedYear];

  return(
    <div className="page">
      <header className="topbar" style={{animation: "fadeUp 0.5s"}}>
        <div className="topbar-brand">
          <div className="brand-icon">PR</div>
          <div className="brand-text"><span>หน่วยสื่อสารองค์กร</span><br/>สำนักหอสมุด มหาวิทยาลัยเชียงใหม่</div>
        </div>
        
        <div className="user-actions">
          {user && (
            <div className="user-info">
              <div className="user-name">{user.displayName}</div>
              <div style={{fontSize: "11px", color: "var(--text-dim)"}}>{user.roleLabel}</div>
            </div>
          )}
          <button className="btn-logout" onClick={handleLogout}>ออกจากระบบ</button>
        </div>
      </header>

      <section className="hero" style={{animation: "fadeUp 0.5s 0.1s both"}}>
        <h1>ระบบสรุปผลการดำเนินการ (PR CMUL)</h1>
        <p style={{color: "var(--text-dim)"}}>เลือกปีงบประมาณเพื่อเรียกดูรายงานผลแต่ละเดือน</p>

        <div className="year-selector">
          {YEARS.map(y=>(
            <button key={y} className={`btn-year ${selectedYear===y?'active':''}`} onClick={()=>setSelectedYear(y)}>
              ปี {y}
            </button>
          ))}
        </div>
      </section>

      <section className="cards-section">
        <div className="cards-grid">
          {currentYearData.map((data, index) => {
            const isEmpty = data.theme === "empty";
            return (
              <div key={index} className={`custom-card theme-${data.theme}`} style={{animation: `fadeUp 0.5s ${0.2 + (index*0.05)}s both`}}>
                <div className="card-top-line"></div>
                
                <div className="c-header">
                  <div className="c-icon-box">{data.icon || "📁"}</div>
                  <div className="c-badge">{data.badge || `ประจำเดือน${data.month}`}</div>
                </div>

                <div className="c-title">{data.title}</div>
                <div className="c-desc">{data.desc}</div>

                {!isEmpty && data.stats && (
                  <div className="c-stats-row">
                    {data.stats.map((stat, i) => (
                      <div className="c-stat-col" key={i}>
                        <div className="c-stat-val">{stat.val}</div>
                        <div className="c-stat-label">{stat.label}</div>
                      </div>
                    ))}
                  </div>
                )}

                {!isEmpty ? (
                  <a href={data.link} target="_blank" rel="noopener noreferrer" className="c-btn">
                    ดูรายงานฉบับเต็ม &rarr;
                  </a>
                ) : (
                  <button className="c-btn c-btn-empty" disabled>ยังไม่มีข้อมูล</button>
                )}
              </div>
            );
          })}
        </div>
      </section>
      
      <footer style={{textAlign: "center", padding: "30px", fontSize: "12px", color: "var(--text-muted)"}}>
        หน่วยสื่อสารองค์กร สำนักหอสมุด มหาวิทยาลัยเชียงใหม่ &middot; PR CMUL Dashboard <br> Developed by Thianrawich and Mod-Ngarm Team <br>Copyright © 2026
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
