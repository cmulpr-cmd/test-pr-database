<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #f3f5f9;
  --surface: #ffffff;
  --text: #1a1d2e;
  --text-dim: #5a6178;
  --text-muted: #8c93a8;
  --border: #e2e8f0;
  --primary: #7c3aed;
}
body { font-family: 'Sarabun', 'Noto Sans Thai', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Background Animation */
.bg-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.bg-scene::before { content: ''; position: absolute; top: -20%; left: -15%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(8,145,178,0.05) 0%, transparent 70%); animation: drift1 20s ease-in-out infinite; }
.bg-scene::after { content: ''; position: absolute; bottom: -15%; right: -10%; width: 55%; height: 55%; background: radial-gradient(ellipse, rgba(124,58,237,0.05) 0%, transparent 70%); animation: drift2 25s ease-in-out infinite; }
@keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(4%,6%)} }
@keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5%,-4%)} }
@keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}

.page { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; }

/* Topbar */
.topbar { padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.brand-text { font-size: 14px; font-weight: 600; color: var(--text-dim); }
.brand-text span { color: var(--text); font-weight: 700; }
.user-actions { display: flex; align-items: center; gap: 12px; }
.user-info { text-align: right; margin-right: 8px; }
.user-name { color: var(--text); font-size: 14px; font-weight: 700; }
.btn-logout { padding: 8px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border:none; background: rgba(239,68,68,0.1); color: #ef4444; font-family: 'Noto Sans Thai', sans-serif; transition: 0.2s; }
.btn-logout:hover { background: rgba(239,68,68,0.15); }
.btn-icon { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s; display: flex; align-items: center; justify-content: center; color: var(--text-dim); }
.btn-icon:hover { background: rgba(0,0,0,0.05); color: var(--text); }

/* Hero & Year Selector */
.hero { padding: 40px 40px 20px; text-align: center; }
.hero h1 { font-family: 'Noto Sans Thai', sans-serif; font-size: 32px; font-weight: 900; color: var(--text); margin-bottom: 10px; }
.year-selector { display: flex; justify-content: center; gap: 8px; margin-top: 24px; flex-wrap: wrap; }
.btn-year { padding: 10px 24px; border-radius: 100px; border: 1px solid var(--border); background: #fff; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Noto Sans Thai', sans-serif; }
.btn-year.active { background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; border-color: transparent; box-shadow: 0 4px 16px rgba(124,58,237,0.25); }

/* Cards Grid */
.cards-section { flex: 1; padding: 20px 40px 80px; max-width: 1200px; margin: 0 auto; width: 100%; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 30px; }
.custom-card { background: var(--surface); border-radius: 20px; padding: 35px 30px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
.custom-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.08); }
.card-top-line { position: absolute; top: 0; left: 0; right: 0; height: 6px; }

/* Themes */
.theme-internal .card-top-line { background: linear-gradient(90deg, #10b981, #0ea5e9); }
.theme-internal .c-icon-box { background: #ecfdf5; color: #0f766e; }
.theme-internal .c-badge { background: #d1fae5; color: #047857; }
.theme-internal .c-stat-val { color: #0284c7; }
.theme-internal .c-btn { background: linear-gradient(90deg, #10b981, #0ea5e9); }
.theme-external .card-top-line { background: linear-gradient(90deg, #ec4899, #8b5cf6); }
.theme-external .c-icon-box { background: #fdf2f8; color: #be185d; }
.theme-external .c-badge { background: #fce7f3; color: #be185d; }
.theme-external .c-stat-val { color: #7c3aed; }
.theme-external .c-btn { background: linear-gradient(90deg, #d946ef, #8b5cf6); }
.theme-empty .card-top-line { background: #e2e8f0; }
.theme-empty .c-icon-box { background: #f1f5f9; color: #94a3b8; }
.theme-empty .c-badge { background: #f1f5f9; color: #64748b; }

.c-header { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 20px; }
.c-icon-box { width: 56px; height: 56px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
.c-badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; font-family: 'Noto Sans Thai'; }
.c-title { font-family: 'Noto Sans Thai', sans-serif; font-size: 20px; font-weight: 800; line-height: 1.4; color: var(--text); margin-bottom: 12px; }
.c-desc { font-size: 14px; color: var(--text-dim); line-height: 1.6; flex: 1; }
.c-stats-row { display: flex; gap: 24px; margin-top: 24px; padding-top: 24px; border-top: 1px dashed #e2e8f0; }
.c-stat-col { flex: 1; }
.c-stat-val { font-size: 24px; font-weight: 800; font-family: 'Noto Sans Thai'; margin-bottom: 4px; letter-spacing: -0.5px; }
.c-stat-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.c-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 24px; border-radius: 12px; color: #fff; text-decoration: none; font-family: 'Noto Sans Thai'; font-size: 14px; font-weight: 700; margin-top: 24px; width: fit-content; transition: opacity 0.3s; border: none; cursor:pointer; }
.c-btn:hover { opacity: 0.9; }
.c-btn-empty { background: #e2e8f0; color: #64748b; cursor: not-allowed; }

@media (max-width: 768px) { .cards-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 24px; } }

/* Loading Overlay */
.loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; backdrop-filter: blur(8px); }
.loading-overlay.active { opacity: 1; pointer-events: auto; }
.graph-loader { display: flex; align-items: flex-end; gap: 6px; height: 50px; margin-bottom: 24px; }
.graph-bar { width: 10px; height: 50px; background: linear-gradient(to top, #2563eb, #0ea5e9); border-radius: 6px; animation: graph-wave 1.2s ease-in-out infinite; transform-origin: bottom; }
.graph-bar:nth-child(1) { animation-delay: 0.0s; height: 30%; }
.graph-bar:nth-child(2) { animation-delay: 0.1s; height: 70%; }
.graph-bar:nth-child(3) { animation-delay: 0.2s; height: 100%; }
.graph-bar:nth-child(4) { animation-delay: 0.3s; height: 50%; }
.graph-bar:nth-child(5) { animation-delay: 0.4s; height: 80%; }
@keyframes graph-wave { 0%, 100% { transform: scaleY(0.4); opacity: 0.5; } 50% { transform: scaleY(1); opacity: 1; } }
.loading-text { text-align: center; color: var(--text); font-size: 18px; font-weight: 700; line-height: 1.6; }
.loading-subtext { color: var(--text-muted); font-size: 14px; font-weight: 500; }

/* Modal เปลี่ยนรหัสผ่าน */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-card { background: #fff; width: 90%; max-width: 400px; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); transform: translateY(20px); transition: 0.3s; }
.modal-overlay.active .modal-card { transform: translateY(0); }
.modal-title { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: var(--text); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-cancel { padding: 10px 16px; border: none; background: #f1f5f9; color: #64748b; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Noto Sans Thai'; }
.btn-save { padding: 10px 16px; border: none; background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff; border-radius: 10px; cursor: pointer; font-weight: 600; font-family: 'Noto Sans Thai'; }
.btn-save:disabled { opacity: 0.7; cursor: not-allowed; }
.msg-alert { font-size: 13px; margin-bottom: 15px; padding: 10px; border-radius: 8px; display: none; text-align: center;}
.msg-alert.error { background: #fef2f2; color: #dc2626; display: block; }
.msg-alert.success { background: #ecfdf5; color: #059669; display: block; }

/* ช่องกรอกรหัสแบบมีปุ่มเปิดตา */
.input-wrapper-modal { position: relative; margin-bottom: 16px; }
.input-wrapper-modal input { width: 100%; padding: 12px 40px 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-family: 'Sarabun', sans-serif; outline: none; transition: 0.2s; font-size: 1rem; }
.input-wrapper-modal input:focus { border-color: var(--primary); }
.toggle-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; opacity: 0.4; transition: 0.2s; padding: 5px; display: flex; }
.toggle-btn:hover { opacity: 1; }
.toggle-btn svg { width: 18px; height: 18px; fill: var(--text-dim); }
</style>
<script>
(function(){
  var allowed=false;
  try{
    var raw=localStorage.getItem('cc_pr_user');
    if(raw){var user=JSON.parse(raw);
      if(user.username&&user.displayName&&user.role&&user.loggedInAt){
        var TIMEOUT_MS=30*60*1000;
        if(Date.now()-new Date(user.loggedInAt).getTime()<24*60*60*1000){
          var lastAct=localStorage.getItem('cc_pr_lastActivity');
          if(lastAct&&(Date.now()-parseInt(lastAct,10))>TIMEOUT_MS){
            localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
          }else{localStorage.setItem('cc_pr_lastActivity',Date.now().toString());allowed=true;}
        }else{localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');}
      }
    }
  }catch(e){}
  if(!allowed){
    window.__AUTH_BLOCKED__=true;
    document.addEventListener('DOMContentLoaded',function(){
      document.getElementById('root').innerHTML=
        '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f3f5f9;font-family:\'Noto Sans Thai\',sans-serif"><div style="background:#fff;border-radius:24px;padding:48px 40px;text-align:center;max-width:440px;width:90%;box-shadow:0 25px 60px rgba(0,0,0,0.05); border-top: 5px solid #ef4444;"><div style="font-size: 48px; margin-bottom: 12px;">🔒</div><h1 style="font-size:28px;font-weight:900;margin-bottom:12px;background:linear-gradient(135deg, #ef4444, #991b1b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:inline-block;">Access Denied</h1><p style="color:#475569;font-size:15px;line-height:1.6;margin-bottom:28px;font-weight:500;">หากท่านเป็นผู้ปฏิบัติงาน "หน่วยสื่อสารองค์กร"<br>กรุณาเข้าสู่ระบบก่อนใช้งาน</p><a href="index.html" style="display:inline-block;padding:12px 36px;border-radius:12px;background:linear-gradient(135deg, #7c3aed, #2563eb);color:#fff;text-decoration:none;font-weight:700;font-size:15px;box-shadow:0 8px 20px rgba(124,58,237,0.25); transition:transform 0.2s;">เข้าสู่ระบบ</a></div></div>';
    });
  }
})();
</script>

  const [showConfirm, setShowConfirm] = useState(false);

  const handleNavigate = (e, link) => {
    e.preventDefault();
    setIsNavigating(true);
    setTimeout(() => { window.location.href = link; }, 1500); 
  };
  
  useEffect(()=>{
    const TIMEOUT_MS=30*60*1000;
    function updateActivity(){localStorage.setItem('cc_pr_lastActivity',Date.now().toString());}
    const events=['mousemove','mousedown','keydown','scroll','touchstart','click'];
    events.forEach(ev=>window.addEventListener(ev,updateActivity,{passive:true}));
    updateActivity();
    const checker=setInterval(()=>{
      const last=parseInt(localStorage.getItem('cc_pr_lastActivity')||'0',10);
      if(Date.now()-last>TIMEOUT_MS){
        clearInterval(checker);localStorage.removeItem('cc_pr_user');localStorage.removeItem('cc_pr_lastActivity');
        window.location.href="index.html";
      }
    },10000);
    return()=>{events.forEach(ev=>window.removeEventListener(ev,updateActivity));clearInterval(checker);};
  },[]);

  const handleLogout=()=>{localStorage.removeItem("cc_pr_user");localStorage.removeItem("cc_pr_lastActivity");window.location.href="index.html";};

  const handleChangePassword = async () => {
    const safeOldPass = oldPass.trim();
    const safeNewPass = newPass.trim();
    const safeConfirmPass = confirmPass.trim();

    if (!safeOldPass || !safeNewPass || !safeConfirmPass) {
        setMsg({ type: 'error', text: 'กรุณากรอกข้อมูลให้ครบถ้วน' });
        return;
    }
    if (safeNewPass !== safeConfirmPass) {
      setMsg({ type: 'error', text: 'รหัสผ่านใหม่ไม่ตรงกัน' });
      return;
    }
    if (safeNewPass.length < 6) {
      setMsg({ type: 'error', text: 'รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร' });
      return;
    }

    setLoadingPass(true);
    setMsg({ type: '', text: '' });

    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({
          action: 'changePassword',
          username: user.username,
          oldPassword: safeOldPass,
          newPassword: safeNewPass
        })
      });

      const result = await response.json();
      if (result.success) {
        setMsg({ type: 'success', text: 'เปลี่ยนรหัสผ่านสำเร็จ!' });
        setTimeout(() => {
          setIsSettingsOpen(false);
          setOldPass(''); setNewPass(''); setConfirmPass(''); setMsg({ type: '', text: '' });

        }, 2000);

        setMsg({ type: 'error', text: result.message || 'รหัสผ่านเดิมไม่ถูกต้อง' });
      }

      console.error("Fetch Error:", error);
      setMsg({ type: 'error', text: 'บันทึกไม่ได้: โปรดตรวจสอบการ Deploy ใน Apps Script' });

    setLoadingPass(false);

          {msg.text && <div className={`msg-alert ${msg.type}`}>{msg.text}</div>}

          <div className="input-wrapper-modal">
            <input type={showOld ? "text" : "password"} placeholder="รหัสผ่านเดิม" value={oldPass} onChange={(e) => setOldPass(e.target.value)} />
            <button type="button" className="toggle-btn" onClick={() => setShowOld(!showOld)}>{showOld ? IconEyeOpen : IconEyeClosed}</button>
          </div>

          <div className="input-wrapper-modal">
            <input type={showNew ? "text" : "password"} placeholder="รหัสผ่านใหม่" value={newPass} onChange={(e) => setNewPass(e.target.value)} />
            <button type="button" className="toggle-btn" onClick={() => setShowNew(!showNew)}>{showNew ? IconEyeOpen : IconEyeClosed}</button>
          </div>

          <div className="input-wrapper-modal">
            <input type={showConfirm ? "text" : "password"} placeholder="ยืนยันรหัสผ่านใหม่" value={confirmPass} onChange={(e) => setConfirmPass(e.target.value)} />
            <button type="button" className="toggle-btn" onClick={() => setShowConfirm(!showConfirm)}>{showConfirm ? IconEyeOpen : IconEyeClosed}</button>
          </div>
                 
          <div className="modal-actions">
            <button className="btn-cancel" onClick={() => { 
                setIsSettingsOpen(false); setMsg({type:'', text:''}); 
                setOldPass(''); setNewPass(''); setConfirmPass(''); 
                setShowOld(false); setShowNew(false); setShowConfirm(false);
            }}>ยกเลิก</button>
            <button className="btn-save" onClick={handleChangePassword} disabled={loadingPass}>
              {loadingPass ? "กำลังบันทึก..." : "บันทึกรหัสผ่าน"}
            </button>
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard/>);
</script>
</body>
</html>
